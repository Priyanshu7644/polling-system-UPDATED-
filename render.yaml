services:
  # Backend Web Service
  - type: web
    name: polling-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        sync: false # You will need to set this securely in the Render Dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: "https://polling-frontend.onrender.com"
      - key: EMAIL_USER
        sync: false # Set in Render Dashboard
      - key: EMAIL_PASS
        sync: false # Set in Render Dashboard

  # Frontend Static Site
  - type: web
    name: polling-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install --legacy-peer-deps && npm run build
    staticPublishPath: dist
    envVars:
      - key: NPM_CONFIG_LEGACY_PEER_DEPS
        value: "true"
      - key: VITE_API_URL
        value: "https://polling-backend-pyv1.onrender.com/api"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
